<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d1214">
  <title>AI 认知科普与实操分享｜杨威</title>
  <link rel="icon" href="data:,">
  <link rel="preload" href="images/ai-agent-hero.webp" as="image" fetchpriority="high">
  <link rel="stylesheet" href="styles.css?v=20260714-level-test-v1">
</head>
<body>
  <main id="deck" aria-live="polite"></main>

  <div class="course-progress" aria-hidden="true">
    <span id="progressFill"></span>
  </div>

  <header class="top-controls" aria-label="PPT 控制">
    <button id="thumbButton" type="button" title="打开缩略图">缩略图</button>
    <label class="jump-control">
      <span>跳页</span>
      <input id="jumpInput" type="number" min="1" value="1" aria-label="输入页码">
      <span id="jumpTotal">/ 0</span>
    </label>
    <button id="jumpButton" type="button">跳转</button>
    <button id="fullscreenButton" type="button" title="进入全屏">全屏</button>
  </header>

  <div class="course-meta" aria-hidden="true">
    <span id="moduleLabel">开场</span>
    <span id="pageLabel">01 / 00</span>
  </div>

  <nav id="dots" aria-label="课件页码"></nav>

  <div id="thumbBackdrop" class="thumb-backdrop" hidden></div>
  <aside id="thumbPanel" class="thumb-panel" aria-label="缩略图跳页" aria-hidden="true">
    <div class="thumb-head">
      <div>
        <strong>课程目录</strong>
        <span id="thumbCount">0 页</span>
      </div>
      <button id="thumbClose" type="button" aria-label="关闭缩略图">关闭</button>
    </div>
    <div id="thumbGrid" class="thumb-grid"></div>
  </aside>

  <div class="keyboard-hint" aria-hidden="true">← → 翻页　ESC 目录</div>
  <script src="script.js?v=20260714-level-test-v1"></script>
</body>
</html>
